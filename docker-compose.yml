# ════════════════════════════════════════════════
# Elemental Clash — 게임노드 운영자용 Docker Compose
#
# 사용법:
#   1. .env.example을 .env로 복사 후 값 설정
#   2. docker compose up -d
#   3. Watchtower가 새 이미지를 자동 감지 → pull → 재시작
#
# ════════════════════════════════════════════════

services:
  # ─── 게임노드 ───
  game-node:
    image: soominsa/turgame-node:latest
    container_name: turgame-node
    env_file: .env
    environment:
      NODE_PORT: "7301"
    ports:
      - "7301:7301"
    restart: unless-stopped

  # ─── Watchtower (자동 업데이트) ───
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup --include-stopped turgame-node
    restart: unless-stopped
