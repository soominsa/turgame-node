# ════════════════════════════════════════════════
# Ashcycle — 게임노드 Docker Compose
#
# Docker Hub 이미지 + Watchtower 자동 업데이트
#
# 실행: docker compose up -d
# 로그: docker compose logs -f
# ════════════════════════════════════════════════

services:
  # ─── 게임노드 A (Docker Hub 이미지) ───
  node-a:
    image: soominsa/turgame-node:latest
    container_name: node-a
    env_file: .env
    environment:
      NODE_ID: "node-a"
      NODE_PORT: "7301"
      NODE_MODE: "relay"
      NODE_REGION: "local"
      NODE_MAX_ROOMS: "20"
    restart: unless-stopped

  # ─── Watchtower (node-a 자동 업데이트) ───
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup --include-stopped node-a
    restart: unless-stopped
