name: Docker Hub 배포

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.env.example'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 + Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/turgame-node:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/turgame-node:${{ github.sha }}
